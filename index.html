<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Plush Intentions – Portal Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --brand: #FF4F9F; --brand2: #c8006e; }
*,*::before,*::after { margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif; }

body {
  min-height:100vh;
  background: url('background.png') center/cover no-repeat fixed;
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
}
body::before {
  content:"";position:fixed;inset:0;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(4px);z-index:0;
}

.card {
  position:relative;z-index:1;
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(28px);
  border:1px solid rgba(255,255,255,0.14);
  border-radius:28px;
  padding:44px 40px 48px;
  width:100%;max-width:420px;
  box-shadow:0 12px 50px rgba(0,0,0,0.4);
  display:flex;flex-direction:column;gap:0;
}

/* ── HEADER ── */
.header {
  display:flex;flex-direction:column;align-items:center;gap:10px;
  margin-bottom:28px;
}
.header img {
  width:80px;
  filter:drop-shadow(0 0 12px var(--brand)) drop-shadow(0 0 24px var(--brand));
  animation:glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse {
  0%,100%{filter:drop-shadow(0 0 10px var(--brand)) drop-shadow(0 0 22px var(--brand));}
  50%{filter:drop-shadow(0 0 18px var(--brand)) drop-shadow(0 0 40px var(--brand));}
}
.header h1 {
  font-size:20px;font-weight:800;color:#fff;
  text-shadow:0 0 12px var(--brand);text-align:center;
}
.header p { font-size:13px;color:rgba(255,255,255,0.5);text-align:center; }

/* ── ROLE GRID ── */
.role-grid {
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-bottom:24px;
}
.role-btn {
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:14px 10px;border-radius:14px;cursor:pointer;
  background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.55);font-size:12px;font-weight:600;
  transition:all .2s;text-align:center;line-height:1.3;
}
.role-btn .icon { font-size:22px;margin-bottom:2px; }
.role-btn:hover { background:rgba(255,79,159,0.1);border-color:rgba(255,79,159,0.4);color:#fff; }
.role-btn.active {
  background:rgba(255,79,159,0.18);
  border-color:var(--brand);color:#fff;
  box-shadow:0 0 14px rgba(255,79,159,0.3);
}

/* ── FIELDS ── */
.field-group { display:flex;flex-direction:column;gap:12px;margin-bottom:16px; }
.field-wrap { position:relative; }
.field-wrap input {
  width:100%;background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:12px;padding:13px 16px 13px 42px;
  color:#fff;font-size:14px;outline:none;
  transition:border-color .2s;
}
.field-wrap input:focus { border-color:var(--brand); }
.field-wrap input::placeholder { color:rgba(255,255,255,0.35); }
.field-icon {
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:16px;opacity:.5;pointer-events:none;
}
.toggle-pw {
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:rgba(255,255,255,0.4);
  cursor:pointer;font-size:14px;padding:0;
}
.toggle-pw:hover { color:#fff; }

/* ── ERROR ── */
.error-msg {
  background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);
  border-radius:10px;padding:10px 14px;
  color:#f87171;font-size:12px;text-align:center;
  display:none;margin-bottom:14px;
}
.error-msg.show { display:block; }

/* ── ACCESS BUTTON ── */
.access-btn {
  width:100%;padding:14px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  color:#fff;font-size:14px;font-weight:800;letter-spacing:.5px;
  cursor:pointer;transition:all .2s;text-transform:uppercase;
  box-shadow:0 4px 20px rgba(255,79,159,0.35);
}
.access-btn:hover { transform:translateY(-1px);box-shadow:0 6px 24px rgba(255,79,159,0.5); }
.access-btn:disabled { opacity:.6;cursor:not-allowed;transform:none; }

/* ── LOADER ── */
.spinner {
  display:none;width:20px;height:20px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* ── DIVIDER ── */
.divider {
  font-size:11px;color:rgba(255,255,255,0.3);
  text-align:center;margin-top:20px;
  border-top:1px solid rgba(255,255,255,0.08);
  padding-top:14px;
}
.divider a { color:var(--brand);text-decoration:none;font-weight:600; }
.divider a:hover { text-decoration:underline; }

@media(max-width:380px){
  .card { padding:36px 24px 40px; }
  .role-grid { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <img src="logo.png" alt="Plush Intentions" onerror="this.style.display='none'"/>
    <h1>Plush Intentions LLC</h1>
    <p>Select your role to continue</p>
  </div>

  <!-- ROLE SELECTOR -->
  <div class="role-grid">
    <button class="role-btn active" data-role="admin" onclick="selectRole(this)">
      <span class="icon">🛡️</span>Admin
    </button>
    <button class="role-btn" data-role="technician" onclick="selectRole(this)">
      <span class="icon">🔧</span>Technician
    </button>
    <button class="role-btn" data-role="field_coordinator" onclick="selectRole(this)">
      <span class="icon">📍</span>Field Service<br/>Coordinator
    </button>
    <button class="role-btn" data-role="workorders_coordinator" onclick="selectRole(this)">
      <span class="icon">📋</span>Work Orders<br/>Coordinator
    </button>
  </div>

  <!-- FIELDS -->
  <div class="field-group">
    <div class="field-wrap">
      <span class="field-icon">✉️</span>
      <input type="email" id="email" placeholder="Email Address" autocomplete="username"/>
    </div>
    <div class="field-wrap">
      <span class="field-icon">🔒</span>
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
      <button class="toggle-pw" onclick="togglePw()" tabindex="-1" id="pw-eye">👁</button>
    </div>
  </div>

  <div class="error-msg" id="error-msg">Invalid email or password. Please try again.</div>

  <button class="access-btn" id="access-btn" onclick="doLogin()">
    <span id="btn-label">ADMINISTRATOR ACCESS</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="divider">
    Applying to be a technician? <a href="/technician-onboarding.html">Apply here →</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://iazvpykfdckpffhakncd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_FuojaGp1LlAwV0yxEl8DFA_RbT3FLRe';

// Role → dashboard file mapping
const ROLE_ROUTES = {
  admin:                  '/admin-portal.html',
  technician:             '/technician-dashboard.html',
  field_coordinator:      '/field-coordinator-dashboard.html',
  workorders_coordinator: '/workorders-coordinator-dashboard.html'
};

// Role → button label
const ROLE_LABELS = {
  admin:                  'ADMINISTRATOR ACCESS',
  technician:             'TECHNICIAN ACCESS',
  field_coordinator:      'FIELD COORDINATOR ACCESS',
  workorders_coordinator: 'WORK ORDERS ACCESS'
};

let selectedRole = 'admin';
let sb;

window.addEventListener('load', () => {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  // If already logged in, redirect to the right dashboard
  // Only redirect if we can confirm the role exists in profiles
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) redirectByRole(session.user);
    // If no session, just show the login page — do nothing
  });
});

function selectRole(el) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedRole = el.dataset.role;
  document.getElementById('btn-label').textContent = ROLE_LABELS[selectedRole];
  document.getElementById('error-msg').classList.remove('show');
}

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('error-msg');
  const btn      = document.getElementById('access-btn');
  const spinner  = document.getElementById('spinner');
  const label    = document.getElementById('btn-label');

  errEl.classList.remove('show');
  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.classList.add('show');
    return;
  }

  // Show loading state
  btn.disabled = true;
  label.style.display = 'none';
  spinner.style.display = 'block';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  spinner.style.display = 'none';
  label.style.display = 'block';
  btn.disabled = false;

  if (error) {
    errEl.textContent = 'Invalid email or password. Please try again.';
    errEl.classList.add('show');
    return;
  }

  // Fetch the user's role from profiles table
  const { data: profile } = await sb
    .from('profiles')
    .select('role')
    .eq('id', data.user.id)
    .single();

  const dbRole = profile?.role || selectedRole;

  // Verify the selected role matches their actual role
  if (dbRole !== selectedRole) {
    await sb.auth.signOut();
    errEl.textContent = `Access denied. This account is not registered as a ${ROLE_LABELS[selectedRole].toLowerCase().replace(' access','')}.`;
    errEl.classList.add('show');
    return;
  }

  window.location.href = ROLE_ROUTES[dbRole] || '/admin-portal.html';
}

function redirectByRole(user) {
  sb.from('profiles').select('role').eq('id', user.id).single()
    .then(({ data, error }) => {
      // Only redirect if we got a valid known role — never guess
      if (!error && data?.role && ROLE_ROUTES[data.role]) {
        window.location.href = ROLE_ROUTES[data.role];
      } else {
        // Role not found or unknown — sign out and stay on login page
        sb.auth.signOut();
      }
    })
    .catch(() => {
      // Network/DB error — sign out and stay on login page safely
      sb.auth.signOut();
    });
}

function togglePw() {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
