<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Technician Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

  <style>
    body { margin: 0; background: #0b0e14; color: #fff; font-family: system-ui, sans-serif; }
    nav { display: flex; justify-content: space-around; background: #111827; padding: 12px; border-bottom: 1px solid #1f2937; position: sticky; top: 0; z-index: 10; }
    nav button { background: none; border: none; color: #9ca3af; font-size: 1rem; padding: 8px 12px; cursor: pointer; }
    nav button.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
    .page { display: none; padding: 16px; }
    .page.active { display: block; }
    .job-card { background: #1f2937; padding: 12px; border-radius: 8px; margin-bottom: 12px; }
    .earnings-box { background: #1f2937; padding: 16px; border-radius: 12px; margin-bottom: 16px; }
    .earnings-value { font-size: 2rem; font-weight: bold; color: #3b82f6; }
    #mapbox { width: 100%; height: 70vh; border-radius: 12px; margin-top: 12px; }
  </style>
</head>

<body>

  <nav>
    <button onclick="showPage('dashboard')" id="nav-dashboard" class="active">Dashboard</button>
    <button onclick="showPage('assigned')" id="nav-assigned">Assigned</button>
    <button onclick="showPage('available')" id="nav-available">Available</button>
    <button onclick="showPage('earnings')" id="nav-earnings">Earnings</button>
    <button onclick="showPage('map')" id="nav-map">Map</button>
  </nav>

  <div id="dashboard" class="page active">
    <h2>Welcome Technician</h2>
    <p>Your live job updates will appear here.</p>
  </div>

  <div id="assigned" class="page">
    <h2>Assigned Jobs</h2>
    <div id="assignedJobs"></div>
  </div>

  <div id="available" class="page">
    <h2>Available Jobs</h2>
    <div id="unassignedJobs"></div>
  </div>

  <div id="earnings" class="page">
    <h2>Your Earnings</h2>
    <div class="earnings-box"><p>Today</p><div class="earnings-value" id="earningsToday">$0.00</div></div>
    <div class="earnings-box"><p>This Week</p><div class="earnings-value" id="earningsWeek">$0.00</div></div>
    <div class="earnings-box"><p>This Month</p><div class="earnings-value" id="earningsMonth">$0.00</div></div>
  </div>

  <div id="map" class="page">
    <h2>Technician Map</h2>
    <div id="mapbox"></div>
  </div>

  <!-- LOAD SUPABASE v2 FIRST -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- MAPBOX -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

  <!-- TECH DASHBOARD LOGIC -->
  <script src="/tech-dashboard.js"></script>

</body>
</html>
